apiVersion: batch/v1
kind: Job
metadata:
  name: nix-cache-bootstrap
  namespace: seaweedfs
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: nexus.gillouche.homelab/docker-hub/chrislusf/seaweedfs:4.18
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nix-cache-access-keys
                  key: nix_access_key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nix-cache-access-keys
                  key: nix_secret_key
          command:
            - sh
            - -c
            - |
              set -e
              MASTER="seaweedfs-master.seaweedfs.svc.cluster.local:9333"
              echo "=== Nix Cache S3 Bootstrap ==="
              echo "Waiting for SeaweedFS master..."
              for i in $(seq 1 30); do
                if weed shell -master=$MASTER -filer= <<< "cluster.check" >/dev/null 2>&1; then
                  echo "Master is ready."
                  break
                fi
                echo "Attempt $i/30 - master not ready, retrying in 10s..."
                sleep 10
              done

              weed shell -master=$MASTER <<EOF
              s3.bucket.create -name=nix-cache
              s3.configure -user=nix-cache -access_key=$S3_ACCESS_KEY -secret_key=$S3_SECRET_KEY -actions=Read:nix-cache,Write:nix-cache,List:nix-cache -apply
              EOF

              echo "Bootstrap commands executed."
          volumeMounts: []
      volumes: []
