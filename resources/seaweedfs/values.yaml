master:
  replicas: 3
  affinity: |
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values: ["seaweedfs"]
                - key: app.kubernetes.io/component
                  operator: In
                  values: ["master"]
            topologyKey: "kubernetes.io/hostname"
  data:
    type: "persistentVolumeClaim"
    size: "5Gi"
    storageClass: "longhorn"

  # Volume configuration - reduce size limit to allow more volumes
  volumeSizeLimitMB: 1000  # 1GB per volume instead of default 30GB
  volumePreallocate: false  # Create volumes on-demand

  # Increase timeouts for stability
  livenessProbe:
    initialDelaySeconds: 90
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 5
  readinessProbe:
    initialDelaySeconds: 45
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 5


volume:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  extraArgs:
    - "-rack=$(NODE_NAME)"
    - "-max=200"
  extraEnv:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  affinity: |
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values: ["seaweedfs"]
                - key: app.kubernetes.io/component
                  operator: In
                  values: ["volume"]
            topologyKey: "kubernetes.io/hostname"
  dataDirs:
    - name: data1
      type: "persistentVolumeClaim"
      size: "200Gi"
      storageClass: "longhorn"

filer:
  replicas: 2
  affinity: |
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values: ["seaweedfs"]
                - key: app.kubernetes.io/component
                  operator: In
                  values: ["filer"]
            topologyKey: "kubernetes.io/hostname"
  data:
    type: "persistentVolumeClaim"
    size: "20Gi"
    storageClass: "longhorn"
  ingress:
    enabled: true
    className: "traefik"
    host: "seaweedfs-filer.k3s.gillouche.homelab"
    path: "/"
    pathType: "Prefix"
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
      traefik.ingress.kubernetes.io/router.middlewares: security-authelia@kubernetescrd

s3:
  enabled: true
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  affinity: |
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values: ["seaweedfs"]
                - key: app.kubernetes.io/component
                  operator: In
                  values: ["s3"]
            topologyKey: "kubernetes.io/hostname"
  # Use the sealed secret we just created
  existingSecret: "seaweedfs-s3-secret"
  ingress:
    enabled: true
    className: "traefik"
    host: "seaweedfs-s3.k3s.gillouche.homelab"
    path: "/"
    pathType: "Prefix"
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
      traefik.ingress.kubernetes.io/router.middlewares: security-authelia@kubernetescrd
