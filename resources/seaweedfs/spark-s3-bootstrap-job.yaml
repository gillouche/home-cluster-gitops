apiVersion: batch/v1
kind: Job
metadata:
  name: spark-s3-bootstrap
  namespace: seaweedfs
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: nexus.gillouche.homelab/docker-hub/chrislusf/seaweedfs:4.20
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: spark-access-keys
                  key: spark_access_key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: spark-access-keys
                  key: spark_secret_key
          command:
            - sh
            - -c
            - |
              set -e
              MASTER="seaweedfs-master.seaweedfs.svc.cluster.local:9333"
              echo "=== Spark S3 Bootstrap ==="
              echo "Waiting for SeaweedFS master..."
              for i in $(seq 1 30); do
                if echo "cluster.check" | weed shell -master=$MASTER -filer= >/dev/null 2>&1; then
                  echo "Master is ready."
                  break
                fi
                echo "Attempt $i/30 - master not ready, retrying in 10s..."
                sleep 10
              done

              weed shell -master=$MASTER <<EOF
              s3.bucket.create -name=spark
              s3.configure -user=spark -access_key=$S3_ACCESS_KEY -secret_key=$S3_SECRET_KEY -actions=Read:spark,Write:spark,List:spark -apply
              EOF

              echo "Bootstrap commands executed."
          volumeMounts: []
      volumes: []
