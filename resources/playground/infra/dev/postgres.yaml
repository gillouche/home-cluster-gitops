apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: playground-infra-dev
  labels:
    app: postgres
    environment: dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        environment: dev
    spec:
      nodeSelector:
        workload.tier: infra
      containers:
        - name: postgres
          image: nexus.gillouche.homelab/docker-hub/library/postgres:18.3-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: dev-postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          hostPath:
            path: /mnt/data/playground-infra/dev/postgres
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: playground-infra-dev
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
