apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: playground-infra-prod
  labels:
    app: kafka-ui
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
        environment: prod
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: rpi5b16g3ssd
      containers:
        - name: kafka-ui
          image: nexus.gillouche.homelab/docker-hub/kafbat/kafka-ui:v1.4.2
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "playground-prod"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka.playground-infra-prod.svc.cluster.local:9092"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: playground-infra-prod
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
