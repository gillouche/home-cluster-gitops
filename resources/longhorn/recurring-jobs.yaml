apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-create
  namespace: longhorn-system
spec:
  cron: "0 * * * *"
  task: snapshot
  groups:
  - default
  retain: 1
  concurrency: 3
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-cleanup
  namespace: longhorn-system
spec:
  cron: "30 * * * *"
  task: snapshot-cleanup
  groups:
  - default
  retain: 0
  concurrency: 3
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-delete
  namespace: longhorn-system
spec:
  cron: "15 */2 * * *"
  task: snapshot-delete
  groups:
  - default
  retain: 2
  concurrency: 3
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: filesystem-trim
  namespace: longhorn-system
spec:
  cron: "0 */6 * * *"
  task: "filesystem-trim"
  groups:
  - default
  retain: 0
  concurrency: 3
