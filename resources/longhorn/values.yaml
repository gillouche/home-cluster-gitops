defaultSettings:
  defaultDataPath: "/mnt/ssd_nvme"
  replicaSoftAntiAffinity: false
  replicaZoneSoftAntiAffinity: true
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
  concurrentReplicaRebuildPerNodeLimit: 1
  replicaRebuildingBandwidthLimit: "120000000"
  guaranteedInstanceManagerCPU:
    v1: "0"
    v2: "0"
  replicaReplenishmentWaitInterval: 120
  failedReplicaAutoCleanupPeriod: 60
  defaultReplicaCount: 2
  defaultDataLocality: best-effort
  replicaAutoBalance: best-effort
  createDefaultDiskLabeledNodes: false
  storageReservedPercentageForDefaultDisk: 20
  storageOverProvisioningPercentage: 100
  orphanResourceAutoDeletion: "replica-data;instance"
  orphanResourceAutoDeletionGracePeriod: 300
  offlineReplicaRebuilding: false
  defaultBackupBlockSize: 2
longhornManager:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi
  affinity: {}

longhornDriver:
  resources:
    requests:
      cpu: 15m
      memory: 128Mi
    limits:
      memory: 192Mi

longhornUI:
  resources:
    requests:
      cpu: 15m
      memory: 128Mi
    limits:
      memory: 192Mi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]

persistence:
  defaultClass: true
  defaultClassReplicaCount: 2
  defaultAllowVolumeExpansion: true
metrics:
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: monitoring
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: longhorn_rest_client_rate_limiter_latency_seconds_(bucket|sum|count)
        action: drop
      - sourceLabels: [__name__]
        regex: longhorn_rest_client_request_latency_seconds_(bucket|sum|count)
        action: drop
service:
  ui:
    type: ClusterIP
ingress:
  enabled: false
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: security-authelia@kubernetescrd
