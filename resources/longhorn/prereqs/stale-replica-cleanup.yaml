apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-stale-replica-cleanup
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-stale-replica-cleanup
rules:
- apiGroups: ["longhorn.io"]
  resources: ["replicas"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["longhorn.io"]
  resources: ["volumes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-stale-replica-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-stale-replica-cleanup
subjects:
- kind: ServiceAccount
  name: longhorn-stale-replica-cleanup
  namespace: longhorn-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: longhorn-stale-replica-cleanup
  namespace: longhorn-system
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 240
      ttlSecondsAfterFinished: 300
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: longhorn-stale-replica-cleanup
          restartPolicy: Never
          nodeSelector:
            node-class: homeserver
          containers:
          - name: watchdog
            image: nexus.gillouche.homelab/docker-hub/alpine/kubectl:1.35.3
            env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: longhorn-rebalancer-discord-webhook
                  key: storage-issues
            command:
            - sh
            - -c
            - |
              set -e

              BATCH_LIMIT=500
              REBUILD_LOOP_THRESHOLD=10

              send_discord() {
                LEVEL="$1"
                MSG="$2"
                if [ -z "$DISCORD_WEBHOOK_URL" ]; then
                  echo "[DISCORD $LEVEL] $MSG"
                  return
                fi
                ICON="ℹ️"
                case "$LEVEL" in
                  warning) ICON="⚠️" ;;
                  critical) ICON="🔴" ;;
                esac
                PAYLOAD=$(printf '{"content":"%s **Longhorn Watchdog** — %s"}' "$ICON" "$MSG")
                wget -qO- --post-data="$PAYLOAD" \
                  --header="Content-Type: application/json" \
                  "$DISCORD_WEBHOOK_URL" 2>/dev/null || true
              }

              echo "=== Longhorn Health Watchdog ==="

              REPLICAS_JSON=$(kubectl get replicas.longhorn.io -n longhorn-system -o json)
              VOLUMES_JSON=$(kubectl get volumes.longhorn.io -n longhorn-system -o json)

              TOTAL_RUNNING=$(echo "$REPLICAS_JSON" | jq '[.items[] | select(.status.currentState == "running")] | length')
              TOTAL_ERROR=$(echo "$REPLICAS_JSON" | jq '[.items[] | select(.status.currentState == "error")] | length')
              TOTAL_STOPPED=$(echo "$REPLICAS_JSON" | jq '[.items[] | select(.status.currentState == "stopped")] | length')

              echo "Cluster: $TOTAL_RUNNING running, $TOTAL_ERROR error, $TOTAL_STOPPED stopped replicas"

              if [ "$TOTAL_RUNNING" -lt 2 ]; then
                echo "SAFETY: Only $TOTAL_RUNNING running replicas cluster-wide, skipping all cleanup"
                send_discord "critical" "Only $TOTAL_RUNNING running replicas cluster-wide. Cluster storage may be unhealthy."
                exit 0
              fi

              ERROR_DELETED=0
              if [ "$TOTAL_ERROR" -gt 0 ]; then
                echo "Found $TOTAL_ERROR error-state replicas"
                ERROR_REPLICAS=$(echo "$REPLICAS_JSON" | jq -r '.items[] | select(.status.currentState == "error") | .metadata.name')
                ERROR_NODES=$(echo "$REPLICAS_JSON" | jq -r '[.items[] | select(.status.currentState == "error") | .spec.nodeID] | unique | join(", ")')
                for replica in $ERROR_REPLICAS; do
                  kubectl delete replicas.longhorn.io -n longhorn-system "$replica" --wait=false 2>/dev/null || true
                  ERROR_DELETED=$((ERROR_DELETED + 1))
                done
                echo "Deleted $ERROR_DELETED error replicas"
                send_discord "warning" "Deleted $ERROR_DELETED error-state replicas (nodes: $ERROR_NODES). These were blocking the rebuild queue."
              fi

              FAULTED=$(echo "$VOLUMES_JSON" | jq -r '.items[] | select(.status.robustness == "faulted") | .metadata.name')
              if [ -n "$FAULTED" ]; then
                for vol in $FAULTED; do
                  PVC=$(kubectl get pv "$vol" -o jsonpath='{.spec.claimRef.namespace}/{.spec.claimRef.name}' 2>/dev/null || echo "unknown")
                  send_discord "critical" "Volume $vol is FAULTED (PVC: $PVC). Manual intervention required."
                done
              fi

              DEGRADED=$(echo "$VOLUMES_JSON" | jq -r '.items[] | select(.status.robustness == "degraded") | .metadata.name')
              if [ -n "$DEGRADED" ]; then
                for vol in $DEGRADED; do
                  PVC=$(kubectl get pv "$vol" -o jsonpath='{.spec.claimRef.namespace}/{.spec.claimRef.name}' 2>/dev/null || echo "unknown")
                  VOL_STOPPED=$(echo "$REPLICAS_JSON" | jq --arg v "$vol" '[.items[] | select(.spec.volumeName == $v and .status.currentState == "stopped")] | length')
                  VOL_RUNNING=$(echo "$REPLICAS_JSON" | jq --arg v "$vol" '[.items[] | select(.spec.volumeName == $v and .status.currentState == "running")] | length')

                  if [ "$VOL_STOPPED" -ge "$REBUILD_LOOP_THRESHOLD" ]; then
                    send_discord "critical" "Volume $vol in rebuild loop: $VOL_STOPPED stopped replicas, only $VOL_RUNNING running (PVC: $PVC). Check for error replicas blocking rebuild queue."
                  else
                    send_discord "warning" "Volume $vol degraded: $VOL_RUNNING running, $VOL_STOPPED stopped replicas (PVC: $PVC)"
                  fi
                done
              fi

              SAFE_DELETED=0
              if [ "$TOTAL_STOPPED" -gt 0 ]; then
                SAFE_TO_DELETE=$(echo "$REPLICAS_JSON" | jq -r '
                  [.items[] | {name: .metadata.name, vol: .spec.volumeName, state: .status.currentState}]
                  | group_by(.vol)
                  | .[]
                  | (map(select(.state == "running")) | length) as $running
                  | select($running >= 2)
                  | map(select(.state == "stopped"))
                  | .[].name
                ')

                for replica in $SAFE_TO_DELETE; do
                  if [ "$SAFE_DELETED" -ge "$BATCH_LIMIT" ]; then
                    echo "Batch limit $BATCH_LIMIT reached, stopping"
                    break
                  fi
                  kubectl delete replicas.longhorn.io -n longhorn-system "$replica" --wait=false 2>/dev/null || true
                  SAFE_DELETED=$((SAFE_DELETED + 1))
                done
              fi

              ORPHAN_DELETED=0
              ORPHAN_REPLICAS=$(echo "$REPLICAS_JSON" | jq -r '.items[] | select(.spec.nodeID == "" and .status.currentState == "stopped") | .metadata.name')
              if [ -n "$ORPHAN_REPLICAS" ]; then
                for replica in $ORPHAN_REPLICAS; do
                  VOL=$(echo "$REPLICAS_JSON" | jq -r --arg r "$replica" '.items[] | select(.metadata.name == $r) | .spec.volumeName')
                  VOL_RUNNING=$(echo "$REPLICAS_JSON" | jq --arg v "$VOL" '[.items[] | select(.spec.volumeName == $v and .status.currentState == "running")] | length')
                  if [ "$VOL_RUNNING" -ge 2 ]; then
                    kubectl delete replicas.longhorn.io -n longhorn-system "$replica" --wait=false 2>/dev/null || true
                    ORPHAN_DELETED=$((ORPHAN_DELETED + 1))
                  fi
                done
              fi

              echo "Summary: error=$ERROR_DELETED stopped=$SAFE_DELETED orphan=$ORPHAN_DELETED deleted"
              TOTAL_DELETED=$((ERROR_DELETED + SAFE_DELETED + ORPHAN_DELETED))
              if [ "$TOTAL_DELETED" -gt 50 ]; then
                send_discord "info" "Cleanup: deleted $ERROR_DELETED error, $SAFE_DELETED stopped, $ORPHAN_DELETED orphan replicas"
              fi

              echo "=== Watchdog complete ==="
