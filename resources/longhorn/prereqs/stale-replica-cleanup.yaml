apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-stale-replica-cleanup
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-stale-replica-cleanup
rules:
- apiGroups: ["longhorn.io"]
  resources: ["replicas"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["longhorn.io"]
  resources: ["volumes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["longhorn-watchdog-state"]
  verbs: ["get", "update", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-stale-replica-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-stale-replica-cleanup
subjects:
- kind: ServiceAccount
  name: longhorn-stale-replica-cleanup
  namespace: longhorn-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: longhorn-stale-replica-cleanup
  namespace: longhorn-system
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 240
      ttlSecondsAfterFinished: 300
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: longhorn-stale-replica-cleanup
          restartPolicy: Never
          nodeSelector:
            node-class: homeserver
          containers:
          - name: watchdog
            image: nexus.gillouche.homelab/docker-hub/alpine/kubectl:1.35.3
            env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: longhorn-rebalancer-discord-webhook
                  key: storage-issues
            command:
            - sh
            - -c
            - |
              set -e

              BATCH_LIMIT=500
              REBUILD_LOOP_THRESHOLD=10
              STATE_CM="longhorn-watchdog-state"
              STATE_NS="longhorn-system"

              get_state() {
                kubectl get configmap "$STATE_CM" -n "$STATE_NS" -o jsonpath="{.data.$1}" 2>/dev/null || echo ""
              }

              save_state() {
                kubectl get configmap "$STATE_CM" -n "$STATE_NS" >/dev/null 2>&1 || \
                  kubectl create configmap "$STATE_CM" -n "$STATE_NS" --from-literal=placeholder=init 2>/dev/null
                kubectl patch configmap "$STATE_CM" -n "$STATE_NS" \
                  --type merge -p "{\"data\":{\"$1\":\"$2\"}}" 2>/dev/null || true
              }

              clear_state() {
                kubectl get configmap "$STATE_CM" -n "$STATE_NS" >/dev/null 2>&1 && \
                  kubectl patch configmap "$STATE_CM" -n "$STATE_NS" \
                    --type merge -p "{\"data\":{\"$1\":null}}" 2>/dev/null || true
              }

              send_discord() {
                LEVEL="$1"
                MSG="$2"
                if [ -z "$DISCORD_WEBHOOK_URL" ]; then
                  echo "[DISCORD $LEVEL] $MSG"
                  return
                fi
                COLOR=3066993
                ICON="INFO"
                TITLE="Longhorn Storage"
                case "$LEVEL" in
                  warning) COLOR=15844367; ICON="WARNING"; TITLE="Longhorn Warning" ;;
                  critical) COLOR=15158332; ICON="CRITICAL"; TITLE="Longhorn Critical" ;;
                  info) COLOR=3447003; ICON="INFO"; TITLE="Longhorn Info" ;;
                esac
                SAFE_MSG=$(printf '%s' "$MSG" | sed 's/"/\\"/g; s/\t/\\t/g' | tr '\n' ' ')
                PAYLOAD=$(cat <<EOFPAYLOAD
              {"embeds":[{"title":"$TITLE","description":"$SAFE_MSG","color":$COLOR,"footer":{"text":"Longhorn Watchdog"}}]}
              EOFPAYLOAD
                )
                wget -qO- --post-data="$PAYLOAD" \
                  --header="Content-Type: application/json" \
                  "$DISCORD_WEBHOOK_URL" 2>/dev/null || true
              }

              echo "=== Longhorn Health Watchdog ==="

              ALL_REPLICAS=$(kubectl get replicas.longhorn.io -n longhorn-system --no-headers \
                -o custom-columns='NAME:.metadata.name,VOL:.spec.volumeName,STATE:.status.currentState,NODE:.spec.nodeID')

              TOTAL_RUNNING=$(echo "$ALL_REPLICAS" | awk '$3 == "running"' | wc -l | tr -d ' ')
              TOTAL_ERROR=$(echo "$ALL_REPLICAS" | awk '$3 == "error"' | wc -l | tr -d ' ')
              TOTAL_STOPPED=$(echo "$ALL_REPLICAS" | awk '$3 == "stopped"' | wc -l | tr -d ' ')

              echo "Cluster: $TOTAL_RUNNING running, $TOTAL_ERROR error, $TOTAL_STOPPED stopped"

              if [ "$TOTAL_RUNNING" -lt 2 ]; then
                echo "SAFETY: Only $TOTAL_RUNNING running replicas cluster-wide, skipping all cleanup"
                send_discord "critical" "Only **$TOTAL_RUNNING** running replicas cluster-wide. Cluster storage may be unhealthy.\n\n**Replicas:** $TOTAL_RUNNING running, $TOTAL_ERROR error, $TOTAL_STOPPED stopped\n**Action:** All cleanup skipped (safety threshold)"
                exit 0
              fi

              ERROR_DELETED=0
              if [ "$TOTAL_ERROR" -gt 0 ]; then
                echo "Found $TOTAL_ERROR error-state replicas"
                ERROR_NAMES=$(echo "$ALL_REPLICAS" | awk '$3 == "error" {print $1}')
                ERROR_NODES=$(echo "$ALL_REPLICAS" | awk '$3 == "error" {print $4}' | sort -u | tr '\n' ',' | sed 's/,$//')
                for replica in $ERROR_NAMES; do
                  kubectl delete replicas.longhorn.io -n longhorn-system "$replica" --wait=false 2>/dev/null || true
                  ERROR_DELETED=$((ERROR_DELETED + 1))
                done
                echo "Deleted $ERROR_DELETED error replicas on nodes: $ERROR_NODES"
                send_discord "warning" "Deleted **$ERROR_DELETED** error-state replicas\n\n**Nodes:** \`$ERROR_NODES\`\n**Impact:** These were blocking the rebuild queue"
              fi

              FAULTED_VOLS=$(kubectl get volumes.longhorn.io -n longhorn-system --no-headers \
                -o custom-columns='NAME:.metadata.name,ROBUSTNESS:.status.robustness' \
                | awk '$2 == "faulted" {print $1}')
              if [ -n "$FAULTED_VOLS" ]; then
                for vol in $FAULTED_VOLS; do
                  PVC=$(kubectl get pv "$vol" -o jsonpath='{.spec.claimRef.namespace}/{.spec.claimRef.name}' 2>/dev/null || echo "unknown")
                  send_discord "critical" "Volume is **FAULTED** - manual intervention required\n\n**PVC:** \`$PVC\`\n**Volume:** \`$vol\`"
                done
              fi

              DEGRADED_VOLS=$(kubectl get volumes.longhorn.io -n longhorn-system --no-headers \
                -o custom-columns='NAME:.metadata.name,ROBUSTNESS:.status.robustness' \
                | awk '$2 == "degraded" {print $1}')
              ALL_VOLS=$(kubectl get volumes.longhorn.io -n longhorn-system --no-headers \
                -o custom-columns='NAME:.metadata.name,ROBUSTNESS:.status.robustness' \
                | awk '{print $1}')
              for vol in $ALL_VOLS; do
                STATE_KEY=$(echo "$vol" | tr '-' '_')
                IS_DEGRADED=$(echo "$DEGRADED_VOLS" | grep -c "^${vol}$" || echo 0)
                if [ "$IS_DEGRADED" -eq 0 ]; then
                  PREV=$(get_state "$STATE_KEY")
                  if [ -n "$PREV" ]; then
                    echo "Volume $vol recovered from degraded"
                    clear_state "$STATE_KEY"
                  fi
                fi
              done
              if [ -n "$DEGRADED_VOLS" ]; then
                for vol in $DEGRADED_VOLS; do
                  PVC=$(kubectl get pv "$vol" -o jsonpath='{.spec.claimRef.namespace}/{.spec.claimRef.name}' 2>/dev/null || echo "unknown")
                  VOL_STOPPED=$(echo "$ALL_REPLICAS" | awk -v v="$vol" '$2 == v && $3 == "stopped"' | wc -l)
                  VOL_RUNNING=$(echo "$ALL_REPLICAS" | awk -v v="$vol" '$2 == v && $3 == "running"' | wc -l)
                  VOL_STOPPED=$(echo "$VOL_STOPPED" | tr -d ' ')
                  VOL_RUNNING=$(echo "$VOL_RUNNING" | tr -d ' ')

                  DESIRED=$(kubectl get volumes.longhorn.io -n longhorn-system "$vol" -o jsonpath='{.spec.numberOfReplicas}' 2>/dev/null || echo 0)
                  if [ "$VOL_STOPPED" -ge "$REBUILD_LOOP_THRESHOLD" ]; then
                    send_discord "critical" "Volume stuck in rebuild loop\n\n**PVC:** \`$PVC\`\n**Replicas:** $VOL_RUNNING running, $VOL_STOPPED stopped\n**Action:** Check for error replicas blocking rebuild"
                  elif [ "$VOL_STOPPED" -eq 0 ] && [ "$VOL_RUNNING" -ge "$DESIRED" ]; then
                    echo "Volume $vol degraded but rebuilding ($VOL_RUNNING running, 0 stopped), suppressing alert"
                  else
                    STATE_KEY=$(echo "$vol" | tr '-' '_')
                    PREV=$(get_state "$STATE_KEY")
                    if [ -z "$PREV" ]; then
                      echo "Volume $vol degraded (first seen, grace period)"
                      save_state "$STATE_KEY" "degraded"
                    else
                      send_discord "warning" "Volume degraded\n\n**PVC:** \`$PVC\`\n**Replicas:** $VOL_RUNNING running, $VOL_STOPPED stopped"
                    fi
                  fi
                done
              fi

              SAFE_DELETED=0
              if [ "$TOTAL_STOPPED" -gt 0 ]; then
                VOLUMES_WITH_STOPPED=$(echo "$ALL_REPLICAS" | awk '$3 == "stopped" {print $2}' | sort -u)
                for vol in $VOLUMES_WITH_STOPPED; do
                  VOL_RUNNING=$(echo "$ALL_REPLICAS" | awk -v v="$vol" '$2 == v && $3 == "running"' | wc -l)
                  VOL_RUNNING=$(echo "$VOL_RUNNING" | tr -d ' ')
                  if [ "$VOL_RUNNING" -ge 2 ]; then
                    STOPPED_NAMES=$(echo "$ALL_REPLICAS" | awk -v v="$vol" '$2 == v && $3 == "stopped" {print $1}')
                    for replica in $STOPPED_NAMES; do
                      if [ "$SAFE_DELETED" -ge "$BATCH_LIMIT" ]; then
                        echo "Batch limit $BATCH_LIMIT reached"
                        break 2
                      fi
                      kubectl delete replicas.longhorn.io -n longhorn-system "$replica" --wait=false 2>/dev/null || true
                      SAFE_DELETED=$((SAFE_DELETED + 1))
                    done
                  fi
                done
              fi

              EXCESS_DELETED=0
              for vol in $ALL_VOLS; do
                DESIRED=$(kubectl get volumes.longhorn.io -n longhorn-system "$vol" -o jsonpath='{.spec.numberOfReplicas}' 2>/dev/null)
                if [ -z "$DESIRED" ] || [ "$DESIRED" -lt 1 ] 2>/dev/null; then
                  continue
                fi
                VOL_RUNNING_NAMES=$(echo "$ALL_REPLICAS" | awk -v v="$vol" '$2 == v && $3 == "running" {print $1}')
                VOL_RUNNING_COUNT=$(echo "$VOL_RUNNING_NAMES" | grep -c . || echo 0)
                if [ "$VOL_RUNNING_COUNT" -gt "$DESIRED" ]; then
                  EXCESS=$((VOL_RUNNING_COUNT - DESIRED))
                  EXCESS_NAMES=$(echo "$VOL_RUNNING_NAMES" | tail -n "$EXCESS")
                  PVC=$(kubectl get pv "$vol" -o jsonpath='{.spec.claimRef.namespace}/{.spec.claimRef.name}' 2>/dev/null || echo "unknown")
                  echo "Volume $vol has $VOL_RUNNING_COUNT running replicas but spec says $DESIRED, removing $EXCESS excess"
                  for replica in $EXCESS_NAMES; do
                    kubectl delete replicas.longhorn.io -n longhorn-system "$replica" --wait=false 2>/dev/null || true
                    EXCESS_DELETED=$((EXCESS_DELETED + 1))
                  done
                  send_discord "info" "Cleaned up excess replicas\n\n**PVC:** \`$PVC\`\n**Found:** $VOL_RUNNING_COUNT running (expected $DESIRED)\n**Deleted:** $EXCESS excess replicas"
                fi
              done

              ORPHAN_DELETED=0
              ORPHAN_REPLICAS=$(echo "$ALL_REPLICAS" | awk '$3 == "stopped" && ($4 == "" || $4 == "<none>") {print $1}')
              if [ -n "$ORPHAN_REPLICAS" ]; then
                for replica in $ORPHAN_REPLICAS; do
                  VOL=$(echo "$ALL_REPLICAS" | awk -v r="$replica" '$1 == r {print $2}')
                  VOL_RUNNING=$(echo "$ALL_REPLICAS" | awk -v v="$VOL" '$2 == v && $3 == "running"' | wc -l)
                  VOL_RUNNING=$(echo "$VOL_RUNNING" | tr -d ' ')
                  if [ "$VOL_RUNNING" -ge 2 ]; then
                    kubectl delete replicas.longhorn.io -n longhorn-system "$replica" --wait=false 2>/dev/null || true
                    ORPHAN_DELETED=$((ORPHAN_DELETED + 1))
                  fi
                done
              fi

              echo "Summary: error=$ERROR_DELETED stopped=$SAFE_DELETED orphan=$ORPHAN_DELETED excess=$EXCESS_DELETED deleted"
              TOTAL_DELETED=$((ERROR_DELETED + SAFE_DELETED + ORPHAN_DELETED + EXCESS_DELETED))
              if [ "$TOTAL_DELETED" -gt 50 ]; then
                send_discord "info" "Batch cleanup completed\n\n**Error:** $ERROR_DELETED deleted\n**Stopped:** $SAFE_DELETED deleted\n**Orphan:** $ORPHAN_DELETED deleted\n**Excess:** $EXCESS_DELETED deleted\n**Total:** $TOTAL_DELETED replicas removed"
              fi

              echo "=== Watchdog complete ==="
