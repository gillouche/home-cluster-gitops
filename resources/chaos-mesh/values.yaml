# Chaos Mesh Helm Values

# Use containerd runtime for K3s
chaosDaemon:
  runtime: containerd
  socketPath: /run/k3s/containerd/containerd.sock
  resources:
    requests:
      cpu: 15m
      memory: 128Mi
    limits:
      memory: 192Mi

dashboard:
  create: true
  resources:
    requests:
      cpu: 15m
      memory: 192Mi
    limits:
      memory: 384Mi
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - name: chaos.k3s.gillouche.homelab
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
      traefik.ingress.kubernetes.io/router.middlewares: security-authelia@kubernetescrd
  
  # Security is handled by Authelia
  security:
    enabled: false
  
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]

prometheus:
  create: false
  # Connect to existing Prometheus
  # Using the service name from 'monitoring' namespace
  prometheusAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090

# DNS Server for DNSChaos
dnsServer:
  create: true
  resources:
    requests:
      cpu: 15m
      memory: 128Mi
    limits:
      memory: 192Mi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]

# Controller Manager configuration
controllerManager:
  # Default behavior: Chaos only in the namespace where the CR is defined
  # We will enforce this via Gatekeeper or simply usage conventions for now
  enableLeaderElection: true
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 256Mi
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]
  replicaCount: 2
