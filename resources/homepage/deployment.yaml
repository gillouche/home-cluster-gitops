apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-class
                    operator: In
                    values: ["homeserver"]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: ["homepage"]
              topologyKey: kubernetes.io/hostname
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: nexus.gillouche.homelab/docker-hub/library/busybox:latest
          command: ['sh', '-c', 'cp -L /app/config-ro/* /app/config/']
          volumeMounts:
            - name: config-ro
              mountPath: /app/config-ro
            - name: config
              mountPath: /app/config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: homepage
          image: nexus.gillouche.homelab/ghcr-proxy/gethomepage/homepage:v1.10.1
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 15m
              memory: 200Mi
            limits:
              memory: 384Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
            - name: LOG_LEVEL
              value: "debug"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config-ro
          configMap:
            name: homepage-config
        - name: config
          emptyDir: {}
