apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-alerting-rules
  namespace: monitoring
  labels:
    loki_rule: "true"
data:
  rules.yaml: |
    groups:
      - name: k3s-log-alerts
        rules:
          - alert: K3sWatchdogTimeout
            expr: |
              count_over_time({unit="k3s.service"} |= "Watchdog timeout" [5m]) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "K3s watchdog timeout on {{ $labels.hostname }}"
              description: >-
                K3s service hit systemd watchdog timeout on {{ $labels.hostname }}.
                The API server was unresponsive and was killed by systemd.

          - alert: WebhookTLSErrors
            expr: |
              sum by (hostname) (count_over_time({unit="k3s.service"} |= "failed to verify certificate" [5m])) > 10
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Webhook TLS errors flooding on {{ $labels.hostname }}"
              description: >-
                More than 10 webhook TLS verification failures in 5 minutes on {{ $labels.hostname }}.
                A webhook service may have stale certificates.

          - alert: RBACForbidden
            expr: |
              sum by (hostname) (count_over_time({unit="k3s.service"} |= "is forbidden" |= "cannot" [10m])) > 20
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "RBAC forbidden errors on {{ $labels.hostname }}"
              description: >-
                Excessive RBAC forbidden errors on {{ $labels.hostname }}.
                A service account may be missing required roles.

          - alert: KineSlowQuery
            expr: |
              count_over_time({unit="k3s.service"} |= "Slow SQL" [5m]) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Kine slow SQL queries on {{ $labels.hostname }}"
              description: >-
                Multiple slow kine SQL queries detected on {{ $labels.hostname }}.
                Postgres may be overloaded or kine table needs compaction.

      - name: pod-log-alerts
        rules:
          - alert: PodCrashLoopDetected
            expr: |
              count_over_time({namespace=~".+"} |= "Back-off restarting failed container" [10m]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CrashLoopBackOff detected in {{ $labels.namespace }}"
              description: >-
                Container crash-loop detected in namespace {{ $labels.namespace }}.

      - name: systemd-log-alerts
        rules:
          - alert: SDCardIOErrors
            expr: |
              count_over_time({job="systemd-journal"} |= "Card stuck being busy" [15m]) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "SD card I/O errors on {{ $labels.hostname }}"
              description: >-
                SD card controller is hanging on {{ $labels.hostname }}.
                The card may be failing and the node should be drained.

          - alert: OOMKillDetectedInLogs
            expr: |
              count_over_time({job="systemd-journal"} |= "Out of memory: Killed process" [10m]) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "OOM kill detected on {{ $labels.hostname }}"
              description: >-
                The kernel OOM killer was invoked on {{ $labels.hostname }}.

          - alert: FilesystemErrors
            expr: |
              count_over_time({job="systemd-journal"} |~ "EXT4-fs error|FAT-fs.*Volume was not properly unmounted|read-only" [15m]) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Filesystem errors on {{ $labels.hostname }}"
              description: >-
                Filesystem errors detected on {{ $labels.hostname }}.
                Disk may be failing or corrupted.
