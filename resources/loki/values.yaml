loki:
  isDefault: false
  enabled: true
  securityContext:
    fsGroup: 10001
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 10001
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  resources:
    requests:
      cpu: 25m
      memory: 2Gi
    limits:
      memory: 3Gi
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 20Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-class
                operator: In
                values: ["homeserver"]
  initContainers:
    - name: fix-permissions
      image: nexus.gillouche.homelab/docker-hub/library/busybox:latest
      command: ["sh", "-c", "chown -R 10001:10001 /data"]
      volumeMounts:
        - name: storage
          mountPath: /data
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
  extraVolumes:
    - name: alerting-rules
      configMap:
        name: loki-alerting-rules
  extraVolumeMounts:
    - name: alerting-rules
      mountPath: /data/loki/rules/fake/rules.yaml
      subPath: rules.yaml
      readOnly: true
  config:
    table_manager:
      retention_deletes_enabled: true
      retention_period: 7d
    ruler:
      storage:
        type: local
        local:
          directory: /data/loki/rules
      rule_path: /data/loki/rules-tmp
      alertmanager_url: http://alertmanager-operated.monitoring.svc:9093
      ring:
        kvstore:
          store: inmemory
      enable_api: true
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: loki.k3s.gillouche.homelab
        paths:
          - /
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
      traefik.ingress.kubernetes.io/router.middlewares: security-authelia@kubernetescrd

promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 1Gi
  # Collects logs from all nodes automatically
  config:
    clients:
      - url: http://{{ .Release.Name }}:3100/loki/api/v1/push
        batchwait: 1s
        batchsize: 102400
    snippets:
      extraScrapeConfigs: |
        - job_name: journal
          journal:
            path: /var/log/journal
            max_age: 12h
            labels:
              job: systemd-journal
          relabel_configs:
            - source_labels: ['__journal__systemd_unit']
              target_label: 'unit'
            - source_labels: ['__journal__hostname']
              target_label: 'hostname'

  # Mount journal directories from host
  extraVolumes:
    - name: journal
      hostPath:
        path: /var/log/journal
    - name: machine-id
      hostPath:
        path: /etc/machine-id

  extraVolumeMounts:
    - name: journal
      mountPath: /var/log/journal
      readOnly: true
    - name: machine-id
      mountPath: /etc/machine-id
      readOnly: true

grafana:
  enabled: false # We use the one from kube-prometheus-stack
