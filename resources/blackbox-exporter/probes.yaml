apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: vip-health
  namespace: monitoring
  labels:
    release: monitoring
spec:
  jobName: vip-health
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc:9115
  module: icmp
  interval: 30s
  scrapeTimeout: 10s
  targets:
    staticConfig:
      static:
        - 192.168.0.248  # K3s LB VIP
        - 192.168.0.249  # K3s API VIP
        - 192.168.0.251  # Pi-hole DNS VIP
        - 192.168.0.252  # Edge Proxy (Caddy) VIP
        - 192.168.0.253  # Internal LB (HAProxy) VIP
      labels:
        component: vip
---
