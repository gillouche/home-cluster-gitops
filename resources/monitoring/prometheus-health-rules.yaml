apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: prometheus-health-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: prometheus-tsdb-health
      rules:
        - alert: PrometheusCompactionSlow
          expr: histogram_quantile(0.99, rate(prometheus_tsdb_compaction_duration_seconds_bucket[6h])) > 600
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus compaction slow on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} p99 compaction duration is {{ $value | humanizeDuration }}. This may indicate I/O or memory pressure."

        - alert: PrometheusBlockCountHigh
          expr: prometheus_tsdb_blocks_loaded > 40
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "High TSDB block count on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} has {{ $value }} blocks loaded. Compaction may not be keeping up."

        - alert: PrometheusMemoryPressure
          expr: container_memory_working_set_bytes{container="prometheus", namespace="monitoring"} / container_spec_memory_limit_bytes{container="prometheus", namespace="monitoring"} > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus memory pressure on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit. OOM kill risk during compaction."

        - alert: PrometheusStorageSpaceLow
          expr: (1 - prometheus_tsdb_storage_blocks_bytes / (100 * 1024 * 1024 * 1024)) < 0.2
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus storage running low on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} TSDB is using more than 80% of the 100Gi volume. Compaction needs free space to operate."

        - alert: PrometheusWALCorruptions
          expr: increase(prometheus_tsdb_wal_corruptions_total[1h]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "WAL corruption detected on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} has detected WAL corruption. This may lead to data loss and compaction failures."

        - alert: PrometheusHeadSeriesHigh
          expr: prometheus_tsdb_head_series > 1000000
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "High series cardinality on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} has {{ $value | humanize }} active series. High cardinality increases memory and compaction pressure."

    - name: prometheus-operational-health
      rules:
        - alert: PrometheusScrapeErrors
          expr: increase(prometheus_target_scrapes_exceeded_sample_limit_total[5m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus scrape sample limit exceeded on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} has targets exceeding scrape sample limits."

        - alert: PrometheusRuleEvaluationFailures
          expr: increase(prometheus_rule_evaluation_failures_total[5m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus rule evaluation failures on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} has rule evaluation failures. Some alerts may not fire correctly."

        - alert: PrometheusTargetDown
          expr: up{job=~"node-exporter|kubelet|kube-state-metrics|alertmanager"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Critical target {{ $labels.job }} down on {{ $labels.instance }}"
            description: "Prometheus cannot scrape {{ $labels.job }} at {{ $labels.instance }} for >5m."

        - alert: PrometheusNotConnectedToAlertmanager
          expr: prometheus_notifications_alertmanagers_discovered < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Prometheus not connected to Alertmanager on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} has no discovered Alertmanager instances. Alerts will not be delivered."

        - alert: PrometheusRemoteWriteErrors
          expr: rate(prometheus_remote_storage_failed_samples_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus remote write errors on {{ $labels.pod }}"
            description: "Prometheus {{ $labels.pod }} is failing to send samples via remote write."
