apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-status-script
  namespace: monitoring
data:
  status_check.py: |
    import os
    import json
    import urllib.request
    import urllib.parse
    from datetime import datetime

    WEBHOOK_URL = os.environ.get("DISCORD_WEBHOOK_URL")
    PROMETHEUS_URL = "http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090"

    def query_prometheus(query):
        params = urllib.parse.urlencode({'query': query})
        url = f"{PROMETHEUS_URL}/api/v1/query?{params}"
        try:
            with urllib.request.urlopen(url) as response:
                data = json.loads(response.read().decode())
                if data['status'] == 'success' and data['data']['result']:
                    return data['data']['result']
        except Exception as e:
            print(f"Error querying {query}: {e}")
        return []

    def query_prometheus_scalar(query):
        results = query_prometheus(query)
        if results:
            return results[0]['value'][1]
        return "N/A"

    def format_bytes(size):
        try:
            size = float(size)
            power = 2**10
            n = 0
            power_labels = {0 : 'B', 1: 'KiB', 2: 'MiB', 3: 'GiB', 4: 'TiB'}
            while size > power:
                size /= power
                n += 1
            return f"{size:.2f} {power_labels.get(n, '?')}"
        except:
            return size

    def get_longhorn_health():
        degraded = query_prometheus('count(longhorn_volume_robustness == 2) or vector(0)')
        faulted = query_prometheus('count(longhorn_volume_robustness == 3) or vector(0)')
        degraded_count = int(float(degraded[0]['value'][1])) if degraded else 0
        faulted_count = int(float(faulted[0]['value'][1])) if faulted else 0
        if faulted_count > 0:
            return f"FAULTED: {faulted_count} | Degraded: {degraded_count}"
        if degraded_count > 0:
            return f"Degraded: {degraded_count}"
        return "All Healthy"

    def get_argocd_sync():
        outofsync = query_prometheus('count(argocd_app_info{sync_status="OutOfSync"}) or vector(0)')
        degraded = query_prometheus('count(argocd_app_info{health_status="Degraded"}) or vector(0)')
        outofsync_count = int(float(outofsync[0]['value'][1])) if outofsync else 0
        degraded_count = int(float(degraded[0]['value'][1])) if degraded else 0
        parts = []
        if outofsync_count > 0:
            parts.append(f"OutOfSync: {outofsync_count}")
        if degraded_count > 0:
            parts.append(f"Degraded: {degraded_count}")
        return " | ".join(parts) if parts else "All Synced & Healthy"

    def get_active_alerts():
        results = query_prometheus('count by (severity) (ALERTS{alertstate="firing",alertname!="Watchdog"})')
        if not results:
            return "None"
        parts = []
        for r in results:
            severity = r['metric'].get('severity', 'unknown')
            count = int(float(r['value'][1]))
            if count > 0:
                parts.append(f"{severity}: {count}")
        return " | ".join(parts) if parts else "None"

    def get_scrape_health():
        down = query_prometheus('count(up == 0) or vector(0)')
        down_count = int(float(down[0]['value'][1])) if down else 0
        if down_count > 0:
            return f"{down_count} targets down"
        return "All targets up"

    def main():
        if not WEBHOOK_URL:
            print("No webhook URL provided")
            return

        cpu_avg = query_prometheus_scalar('100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)')
        cpu_max = query_prometheus_scalar('max(100 - (rate(node_cpu_seconds_total{mode="idle"}[5m]) * 100))')
        mem_usage = query_prometheus_scalar('sum(node_memory_MemTotal_bytes) - sum(node_memory_MemAvailable_bytes)')
        mem_total = query_prometheus_scalar('sum(node_memory_MemTotal_bytes)')
        nodes_up = query_prometheus_scalar('count(kube_node_info)')
        pods_running = query_prometheus_scalar('count(kube_pod_status_phase{phase="Running"})')
        pvc_usage = query_prometheus_scalar('sum(longhorn_node_storage_usage_bytes)')
        pvc_total = query_prometheus_scalar('sum(longhorn_node_storage_capacity_bytes)')

        try:
            cpu_text = f"Avg: {float(cpu_avg):.1f}% | Max: {float(cpu_max):.1f}%"
        except: cpu_text = "N/A"

        try:
            mem_percent = (float(mem_usage) / float(mem_total)) * 100
            mem_text = f"{format_bytes(mem_usage)} / {format_bytes(mem_total)} ({mem_percent:.1f}%)"
        except: mem_text = "N/A"

        try:
            storage_percent = (float(pvc_usage) / float(pvc_total)) * 100
            storage_text = f"{format_bytes(pvc_usage)} / {format_bytes(pvc_total)} ({storage_percent:.1f}%)"
        except:
            storage_text = f"Used: {format_bytes(pvc_usage)}"

        longhorn_health = get_longhorn_health()
        argocd_sync = get_argocd_sync()
        active_alerts = get_active_alerts()
        scrape_health = get_scrape_health()

        embed = {
            "title": f"Cluster Status - {datetime.now().strftime('%H:%M UTC')}",
            "color": 3066993,
            "fields": [
                {"name": "Nodes", "value": str(nodes_up), "inline": True},
                {"name": "Pods", "value": str(pods_running), "inline": True},
                {"name": "CPU Load", "value": cpu_text, "inline": True},
                {"name": "Memory", "value": mem_text, "inline": True},
                {"name": "Storage (Longhorn)", "value": storage_text, "inline": True},
                {"name": "Volume Health", "value": longhorn_health, "inline": True},
                {"name": "ArgoCD", "value": argocd_sync, "inline": True},
                {"name": "Active Alerts", "value": active_alerts, "inline": True},
                {"name": "Scrape Health", "value": scrape_health, "inline": True},
            ],
            "footer": {"text": "Hourly Heartbeat"}
        }

        payload = {"embeds": [embed]}

        url = WEBHOOK_URL
        if os.path.isfile(url):
            with open(url, 'r') as f:
                url = f.read().strip()

        req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={'Content-Type': 'application/json', 'User-Agent': 'StatusReporter'})
        try:
            urllib.request.urlopen(req)
            print("Status sent successfully")
        except Exception as e:
            print(f"Error sending to Discord: {e}")

    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-status-reporter
  namespace: monitoring
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 2
      template:
        spec:
          containers:
          - name: reporter
            image: nexus.gillouche.homelab/docker-hub/library/python:3.14.3-slim-trixie
            command: ["python", "/app/status_check.py"]
            env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: monitoring-discord-webhooks
                  key: info-alerts
            volumeMounts:
            - name: script
              mountPath: /app/status_check.py
              subPath: status_check.py
          restartPolicy: Never
          volumes:
          - name: script
            configMap:
              name: cluster-status-script
