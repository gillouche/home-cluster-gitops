apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: storage-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: node-filesystem-storage
    rules:
    - alert: StorageNodeFilesystem80Pct
      expr: |
        (
          node_filesystem_avail_bytes{fstype=~"ext4|xfs", mountpoint!~"/boot.*"}
          / node_filesystem_size_bytes{fstype=~"ext4|xfs", mountpoint!~"/boot.*"}
        ) * 100 < 20
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Filesystem {{ $labels.mountpoint }} on {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} >80% full"
        description: "Node {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} mount {{ $labels.mountpoint }} ({{ $labels.device }}) has only {{ $value | printf \"%.1f\" }}% free space."

    - alert: StorageNodeFilesystem90Pct
      expr: |
        (
          node_filesystem_avail_bytes{fstype=~"ext4|xfs", mountpoint!~"/boot.*"}
          / node_filesystem_size_bytes{fstype=~"ext4|xfs", mountpoint!~"/boot.*"}
        ) * 100 < 10
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Filesystem {{ $labels.mountpoint }} on {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} >90% full"
        description: "Node {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} mount {{ $labels.mountpoint }} ({{ $labels.device }}) has only {{ $value | printf \"%.1f\" }}% free space. Immediate action required."

    - alert: StorageNodeInodes80Pct
      expr: |
        (
          node_filesystem_files_free{fstype=~"ext4|xfs", mountpoint!~"/boot.*"}
          / node_filesystem_files{fstype=~"ext4|xfs", mountpoint!~"/boot.*"}
        ) * 100 < 20
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Inodes on {{ $labels.mountpoint }} on {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} >80% used"
        description: "Node {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} mount {{ $labels.mountpoint }} has only {{ $value | printf \"%.1f\" }}% free inodes. File creation will fail when exhausted."

    - alert: StorageNodeFilesystemReadOnly
      expr: node_filesystem_readonly{fstype=~"ext4|xfs", mountpoint!~"/boot.*"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Filesystem {{ $labels.mountpoint }} on {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} is read-only"
        description: "Node {{ or $labels.node ($labels.instance | reReplaceAll \":\\\\d+$\" \"\") }} mount {{ $labels.mountpoint }} has gone read-only. Possible disk failure or corruption."

  - name: pvc-storage
    rules:
    - alert: StoragePVC80Pct
      expr: |
        (
          kubelet_volume_stats_used_bytes
          / kubelet_volume_stats_capacity_bytes
        ) * 100 > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} >80% full"
        description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is at {{ $value | printf \"%.1f\" }}% capacity."

    - alert: StoragePVC90Pct
      expr: |
        (
          kubelet_volume_stats_used_bytes
          / kubelet_volume_stats_capacity_bytes
        ) * 100 > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} >90% full"
        description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is at {{ $value | printf \"%.1f\" }}% capacity. Volume expansion or cleanup needed."

    - alert: StoragePVCInodes80Pct
      expr: |
        (
          kubelet_volume_stats_inodes_used
          / kubelet_volume_stats_inodes
        ) * 100 > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} inodes >80%"
        description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} inode usage is at {{ $value | printf \"%.1f\" }}%."

  - name: longhorn-disk-storage
    rules:
    - alert: StorageLonghornDisk80Pct
      expr: (longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Longhorn disk {{ $labels.disk }} on {{ $labels.node }} >80% full"
        description: "Longhorn disk {{ $labels.disk }} on node {{ $labels.node }} is at {{ $value | printf \"%.1f\" }}% usage."

    - alert: StorageLonghornDisk90Pct
      expr: (longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes) * 100 > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Longhorn disk {{ $labels.disk }} on {{ $labels.node }} >90% full"
        description: "Longhorn disk {{ $labels.disk }} on node {{ $labels.node }} is at {{ $value | printf \"%.1f\" }}% usage. Volumes may fail to schedule."

    - alert: StorageLonghornNodeScheduled80Pct
      expr: (longhorn_node_storage_scheduled_bytes / longhorn_node_storage_capacity_bytes) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Longhorn scheduled storage on {{ $labels.node }} >80%"
        description: "Node {{ $labels.node }} has {{ $value | printf \"%.1f\" }}% of storage capacity scheduled. New volume replicas may not fit."
