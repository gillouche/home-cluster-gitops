apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-health-script
  namespace: monitoring
data:
  check.py: |
    import json
    import os
    import urllib.request
    from datetime import datetime

    WEBHOOK_URL = os.environ.get("DISCORD_WEBHOOK_URL")
    PATRONI_HOSTS = [
        ("homeserver", "192.168.0.87"),
        ("homeserver2", "192.168.0.88"),
        ("homeserver3", "192.168.0.89"),
    ]
    PATRONI_PORT = 8008
    MAX_LAG_MB = 1024

    def get_cluster_state():
        for name, ip in PATRONI_HOSTS:
            url = f"http://{ip}:{PATRONI_PORT}/cluster"
            try:
                with urllib.request.urlopen(url, timeout=5) as resp:
                    return json.loads(resp.read().decode())
            except Exception:
                continue
        return None

    def send_discord(title, description, color=15158332):
        if not WEBHOOK_URL:
            print("No webhook URL")
            return
        url = WEBHOOK_URL
        if os.path.isfile(url):
            with open(url) as f:
                url = f.read().strip()
        embed = {
            "title": title,
            "description": description,
            "color": color,
            "footer": {"text": f"Postgres HA Check - {datetime.now().strftime('%H:%M UTC')}"},
        }
        payload = json.dumps({"embeds": [embed]}).encode()
        req = urllib.request.Request(
            url,
            data=payload,
            headers={"Content-Type": "application/json", "User-Agent": "PostgresHealthCheck"},
        )
        try:
            urllib.request.urlopen(req)
        except Exception as e:
            print(f"Discord send error: {e}")

    def main():
        cluster = get_cluster_state()
        if cluster is None:
            send_discord(
                "CRITICAL: Postgres cluster unreachable",
                "Cannot reach any Patroni endpoint. All 3 homeservers may be down.",
                15158332,
            )
            return

        members = cluster.get("members", [])
        leaders = [m for m in members if m.get("role") == "leader" and m.get("state") == "running"]
        replicas = [m for m in members if m.get("role") != "leader"]

        issues = []

        if not leaders:
            issues.append("No running leader found")

        leader_tl = leaders[0].get("timeline", 0) if leaders else 0

        for r in replicas:
            name = r.get("name", "?")
            state = r.get("state", "unknown")
            tl = r.get("timeline", 0)
            lag = r.get("lag", "unknown")

            healthy_states = ("running", "streaming", "in archive recovery")
            if state not in healthy_states:
                issues.append(f"**{name}**: state=`{state}`")

            if state in healthy_states and tl and leader_tl and tl != leader_tl:
                issues.append(f"**{name}**: timeline {tl} != leader timeline {leader_tl} (diverged)")

            if state in healthy_states and lag != "unknown":
                try:
                    lag_mb = int(lag) / (1024 * 1024)
                    if lag_mb > MAX_LAG_MB:
                        issues.append(f"**{name}**: replication lag {lag_mb:.0f} MB (>{MAX_LAG_MB} MB threshold)")
                except (ValueError, TypeError):
                    pass

        if issues:
            desc = "\n".join(f"- {i}" for i in issues)
            desc += "\n\nRemediation: `ansible-playbook playbooks/includes/maintenance/postgres_heal.yml`"
            send_discord("Postgres HA Cluster Unhealthy", desc, 15158332)
            print(f"Issues found: {issues}")
        else:
            print("Postgres HA cluster healthy")

    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-health-check
  namespace: monitoring
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 1
      template:
        spec:
          containers:
          - name: checker
            image: nexus.gillouche.homelab/docker-hub/library/python:3.14.3-slim-trixie
            command: ["python", "/app/check.py"]
            env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: monitoring-discord-webhooks
                  key: critical-alerts
            volumeMounts:
            - name: script
              mountPath: /app/check.py
              subPath: check.py
          restartPolicy: Never
          volumes:
          - name: script
            configMap:
              name: postgres-health-script
