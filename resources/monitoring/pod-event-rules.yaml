apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-event-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: pod-events
      rules:
        - alert: KubePodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[10m]) * 60 * 10 > 4
          for: 5m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "Pod {{ $labels.pod }} is CrashLooping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }}) has restarted {{ $value }} times in the last 10m."

        - alert: KubePodNotReady
          expr: sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"}) > 0
          for: 10m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "Pod {{ $labels.pod }} Not Ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in non-running state for > 10m."

        - alert: KubePodImagePullBackOff
          expr: kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} > 0
          for: 5m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "Pod {{ $labels.pod }} ImagePullBackOff"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} failed to pull image."

        - alert: KubePodCreateContainerError
          expr: kube_pod_container_status_waiting_reason{reason="CreateContainerError"} > 0
          for: 10m
          labels:
            severity: critical
            category: pod-events
          annotations:
            summary: "Pod {{ $labels.pod }} CreateContainerError"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} on {{ $labels.node }} has been stuck in CreateContainerError for >10m. Likely stale containerd state requiring node reboot."

        - alert: KubeNodeManyPodsNotReady
          expr: |
            count by (node) (
              (kube_pod_status_ready{condition="false"} == 1)
              * on(pod, namespace) group_left(node)
              kube_pod_info
              unless on(pod, namespace)
              kube_pod_status_phase{phase=~"Succeeded|Failed"} == 1
            ) > 5
          for: 15m
          labels:
            severity: critical
            category: pod-events
          annotations:
            summary: "Node {{ $labels.node }} has many non-ready pods"
            description: "Node {{ $labels.node }} has {{ $value }} pods in non-ready state for >15m. Possible node-level issue."

    - name: workload-availability
      rules:
        - alert: KubeDeploymentReplicasMismatch
          expr: kube_deployment_status_replicas_available != kube_deployment_spec_replicas
          for: 15m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "Deployment {{ $labels.deployment }} replicas mismatch"
            description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} available replicas but expects {{ with printf \"kube_deployment_spec_replicas{namespace='%s',deployment='%s'}\" $labels.namespace $labels.deployment | query }}{{ . | first | value }}{{ end }}."

        - alert: KubeStatefulSetReplicasMismatch
          expr: kube_statefulset_status_replicas_ready != kube_statefulset_replicas
          for: 15m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "StatefulSet {{ $labels.statefulset }} replicas mismatch"
            description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has mismatched ready replicas for >15m."

        - alert: KubeDaemonSetNotScheduled
          expr: kube_daemonset_status_desired_number_scheduled - kube_daemonset_status_current_number_scheduled > 0
          for: 15m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "DaemonSet {{ $labels.daemonset }} scheduling mismatch"
            description: "DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} has unscheduled pods for >15m."

        - alert: KubeDaemonSetUnavailable
          expr: kube_daemonset_status_number_unavailable > 0
          for: 15m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "DaemonSet {{ $labels.daemonset }} has unavailable pods"
            description: "DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} has {{ $value }} unavailable pods for >15m."

        - alert: KubeDaemonSetManyUnavailable
          expr: kube_daemonset_status_number_unavailable / kube_daemonset_status_desired_number_scheduled > 0.3
          for: 10m
          labels:
            severity: critical
            category: pod-events
          annotations:
            summary: "DaemonSet {{ $labels.daemonset }} >30% unavailable"
            description: "DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} has {{ $value | humanizePercentage }} of pods unavailable for >10m. Widespread node-level issue."

        - alert: KubeJobFailed
          expr: kube_job_status_failed > 0
          for: 15m
          labels:
            severity: warning
            category: pod-events
          annotations:
            summary: "Job {{ $labels.job_name }} failed"
            description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} has failed."

    - name: coredns
      rules:
        - alert: CoreDNSDown
          expr: up{job="coredns"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "CoreDNS instance down"
            description: "CoreDNS instance at {{ $labels.instance }} has been unreachable for >3m. DNS resolution may fail."

        - alert: CoreDNSHighErrorRate
          expr: rate(coredns_dns_responses_total{rcode="SERVFAIL"}[5m]) / rate(coredns_dns_responses_total[5m]) > 0.01
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "CoreDNS high SERVFAIL rate"
            description: "CoreDNS SERVFAIL rate is {{ $value | humanizePercentage }} for >10m."
