apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-services-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: patroni
    rules:
    - alert: PatroniNodeDown
      expr: probe_success{job="probe/monitoring/patroni-health"} == 0
      for: 3m
      labels:
        severity: critical
      annotations:
        summary: "Patroni endpoint {{ $labels.instance }} is down"
        description: "Patroni health endpoint {{ $labels.instance }} has been unreachable for >3m. Postgres HA is degraded."

    - alert: PatroniNoHealthyNode
      expr: count(probe_success{job="probe/monitoring/patroni-health"} == 1) == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Patroni cluster completely down"
        description: "All 3 Patroni health endpoints are down. Postgres is unavailable. K3s cluster will fail."

    - alert: PatroniSingleNode
      expr: count(probe_success{job="probe/monitoring/patroni-health"} == 1) == 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Patroni running with single node"
        description: "Only 1 of 3 Patroni nodes is healthy. No HA redundancy. Run: ansible-playbook playbooks/includes/maintenance/postgres_heal.yml"

  - name: etcd
    rules:
    - alert: ExternalServiceEtcdDown
      expr: probe_success{job="probe/monitoring/etcd-health"} == 0
      for: 3m
      labels:
        severity: critical
      annotations:
        summary: "Etcd node {{ $labels.instance }} is down"
        description: "Etcd health endpoint {{ $labels.instance }} has been unreachable for >3m. Patroni consensus at risk."

    - alert: ExternalServiceEtcdQuorumLost
      expr: count(probe_success{job="probe/monitoring/etcd-health"} == 1) < 2
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Etcd cluster lost quorum"
        description: "Less than 2 of 3 etcd nodes are healthy. Patroni cannot make leader decisions. Cluster is at risk."

  - name: nexus
    rules:
    - alert: ExternalServiceNexusDown
      expr: probe_success{job="probe/monitoring/nexus-health"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Nexus artifact repository is down"
        description: "Nexus on homeserver3 (192.168.0.89:8081) has been unreachable for >5m. Container image pulls and package proxying will fail."

  - name: pihole
    rules:
    - alert: ExternalServicePiholeDown
      expr: probe_success{job="probe/monitoring/pihole-health"} == 0
      for: 3m
      labels:
        severity: warning
      annotations:
        summary: "Pi-hole instance {{ $labels.instance }} is down"
        description: "Pi-hole admin at {{ $labels.instance }} has been unreachable for >3m."

    - alert: ExternalServicePiholeAllDown
      expr: count(probe_success{job="probe/monitoring/pihole-health"} == 1) == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "All Pi-hole DNS instances are down"
        description: "All 3 Pi-hole instances are unreachable. DNS resolution for the homelab is failing."

  - name: vips
    rules:
    - alert: ExternalServiceVIPDown
      expr: probe_success{job="probe/monitoring/vip-health"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Virtual IP {{ $labels.instance }} is unreachable"
        description: "VIP {{ $labels.instance }} is not responding to ICMP. Keepalived may have failed or the VRRP master is down."

  - name: firefly
    rules:
    - alert: ExternalServiceFireflyDown
      expr: probe_success{job="probe/monitoring/firefly-health"} == 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Firefly III is down"
        description: "Firefly III on homeserver2 (192.168.0.88:8082) has been unreachable for >10m."
