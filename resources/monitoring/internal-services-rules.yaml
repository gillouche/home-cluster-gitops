apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: internal-services-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: k3s-internal-services
    rules:
    - alert: InternalServiceDown
      expr: probe_success{job="probe/monitoring/k3s-internal-services"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Internal service {{ $labels.instance }} is down"
        description: >-
          K3s internal service {{ $labels.instance }} has failed health checks for >2m.
          The service may be misconfigured, crashed, or have RBAC issues.

    - alert: ArgocdDexDown
      expr: probe_success{job="probe/monitoring/argocd-dex-health"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "ArgoCD Dex OIDC server is down"
        description: >-
          ArgoCD Dex server is not responding. OIDC/Authelia login to ArgoCD will fail.
          Check dex pod logs for RBAC or TLS errors.

    - alert: InternalServiceHighLatency
      expr: probe_duration_seconds{job="probe/monitoring/k3s-internal-services"} > 5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Internal service {{ $labels.instance }} responding slowly"
        description: >-
          {{ $labels.instance }} is taking {{ $value | printf "%.1f" }}s to respond.

  - name: k3s-api-health
    rules:
    - alert: K3sAPIServerHighLatency
      expr: histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb!="WATCH"}[5m])) by (le)) > 5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "K3s API server p99 latency is high"
        description: >-
          API server p99 request latency is {{ $value | printf "%.1f" }}s.
          Kine slow queries or webhook timeouts may be the cause.

    - alert: K3sAPIServerErrors
      expr: sum(rate(apiserver_request_total{code=~"5.."}[5m])) / sum(rate(apiserver_request_total[5m])) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "K3s API server error rate above 5%"
        description: >-
          {{ $value | printf "%.1f" }}% of API requests are returning 5xx errors.

    - alert: WebhookAdmissionFailures
      expr: rate(apiserver_admission_webhook_fail_open_count[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Webhook admission failures detected (failing open)"
        description: >-
          Admission webhooks are failing and being bypassed (failurePolicy: Ignore).
          The webhook service may be down or have TLS issues.

  - name: pod-health-deep
    rules:
    - alert: KubePodHighRestartCount
      expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"
        description: >-
          Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }}
          has restarted {{ $value | printf "%.0f" }} times in the last hour.
          The pod may be crash-looping with a functional error that ArgoCD does not detect.

    - alert: KubePodNotReadyLong
      expr: |
        min by (namespace, pod) (
          kube_pod_status_ready{condition="false"}
        ) == 1
        and on(namespace, pod) kube_pod_status_phase{phase="Running"} == 1
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} running but not ready for >30m"
        description: >-
          Pod is Running but readiness probe is failing. The application inside
          may be broken while ArgoCD shows Healthy.

    - alert: KubeContainerOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
        description: >-
          Container was killed due to memory exhaustion. Increase memory limits
          or investigate memory leak.

    - alert: KubePodPendingLong
      expr: kube_pod_status_phase{phase="Pending"} == 1
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck in Pending"
        description: >-
          Pod has been Pending for >15m. Check node resources, nodeSelector,
          tolerations, and PVC availability.

    - alert: KubeJobFailed
      expr: kube_job_status_failed > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
        description: >-
          Job {{ $labels.job_name }} in namespace {{ $labels.namespace }} has failed.

  - name: runner-health
    rules:
    - alert: ArcRunnerListenerDown
      expr: |
        kube_pod_container_status_restarts_total{namespace="arc-systems",container="listener"} > 3
        and on(pod) kube_pod_status_phase{phase="Running"} == 1
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "GitHub Actions runner listener {{ $labels.pod }} is crash-looping"
        description: >-
          Runner listener {{ $labels.pod }} has restarted {{ $value | printf "%.0f" }} times.
          GitHub Actions jobs will not be picked up.

    - alert: ArcNoRunnerListeners
      expr: count(kube_pod_status_phase{namespace="arc-systems",phase="Running"} == 1 and on(pod) kube_pod_labels{label_app_kubernetes_io_component="runner-scale-set-listener"}) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "No ARC runner listeners are running"
        description: >-
          All GitHub Actions runner listeners are down. No CI jobs can be picked up.

  - name: kubelet-health
    rules:
    - alert: KubeletDown
      expr: up{job="kubelet"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Kubelet on {{ $labels.instance }} is down"
        description: >-
          Kubelet metrics endpoint on {{ $labels.instance }} has been unreachable for >5m.
          The node may be unhealthy or the kubelet process may have crashed.
