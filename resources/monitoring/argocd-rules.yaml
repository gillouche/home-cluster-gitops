apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: argocd.rules
    rules:
    - alert: ArgoCDAppOutOfSync
      expr: argocd_app_info{sync_status="OutOfSync"} == 1
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "ArgoCD app {{ $labels.name }} out of sync"
        description: "Application {{ $labels.name }} in project {{ $labels.project }} has been OutOfSync for >15m."

    - alert: ArgoCDAppSyncFailed
      expr: increase(argocd_app_sync_total{phase="Error"}[10m]) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "ArgoCD app {{ $labels.name }} sync failed"
        description: "Application {{ $labels.name }} has sync errors in the last 10m."

    - alert: ArgoCDAppHealthDegraded
      expr: argocd_app_info{health_status=~"Degraded|Missing"} == 1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "ArgoCD app {{ $labels.name }} health {{ $labels.health_status }}"
        description: "Application {{ $labels.name }} health is {{ $labels.health_status }} for >10m."

    - alert: ArgoCDAppHealthSuspended
      expr: argocd_app_info{health_status="Suspended"} == 1
      for: 30m
      labels:
        severity: info
      annotations:
        summary: "ArgoCD app {{ $labels.name }} suspended"
        description: "Application {{ $labels.name }} has been in Suspended state for >30m."

    - alert: ArgoCDRepoServerHighLatency
      expr: histogram_quantile(0.99, rate(argocd_git_request_duration_seconds_bucket[5m])) > 10
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "ArgoCD repo server high git latency"
        description: "ArgoCD repo server p99 git request duration is {{ $value | printf \"%.1f\" }}s (>10s threshold)."

    - alert: ArgoCDControllerHighReconciliation
      expr: rate(argocd_app_reconcile_count[5m]) > 5
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "ArgoCD controller high reconciliation rate"
        description: "ArgoCD application controller is reconciling at {{ $value | printf \"%.1f\" }}/s for >15m."

    - alert: ArgoCDNotificationDeliveryFailed
      expr: increase(argocd_notifications_deliveries_total{succeeded="false"}[10m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "ArgoCD notification delivery failed"
        description: "ArgoCD notifications controller has failed deliveries in the last 10m."

    - alert: ArgoCDServerHighErrorRate
      expr: rate(grpc_server_handled_total{grpc_code!="OK",grpc_service=~".*ArgoCD.*"}[5m]) > 0.1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "ArgoCD server high gRPC error rate"
        description: "ArgoCD server gRPC error rate is {{ $value | printf \"%.2f\" }}/s for >10m."

    - alert: ArgoCDComponentDown
      expr: up{job=~"argocd.*"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "ArgoCD component {{ $labels.job }} down"
        description: "ArgoCD component {{ $labels.job }} has been unreachable for >5m."
