apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: discord-config
  namespace: monitoring
  labels:
    alertmanagerConfig: discord
spec:
  route:
    groupBy: ['alertname', 'job']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 1h
    receiver: 'discord-firing' # Default Fallback for anything not matched
    routes:
      - matchers:
          - name: alertname
            value: Watchdog
        receiver: 'discord-heartbeat'
        repeatInterval: 30m

      
      # -- Critical Infrastructure --
      - matchers:
          - name: alertname
            regex: true
            value: ^(TargetDown|NodeSystemSaturation|NodeHighCPU|InstanceDown|KubeNodeNotReady|NodeOOMKillDetected|NodeKernelDeadlock|NodeReadonlyFilesystem|NodeContainerdUnhealthy|NodeFilesystemCorruption|NodeOOMInLogs)$
        receiver: 'discord-critical'

      # -- ArgoCD --
      - matchers:
          - name: alertname
            regex: true
            value: ^ArgoCD.*$
        receiver: 'discord-critical'

      # -- Storage (Longhorn + node filesystem + PVC) --
      - matchers:
          - name: alertname
            regex: true
            value: ^(Longhorn.*|Volume.*|Storage.*)$
        receiver: 'discord-storage'

      # -- Network --
      # Explicitly catch network alerts first
      - matchers:
          - name: alertname
            regex: true
            value: ^(Probe.*|Net.*|Network.*)$
        receiver: 'discord-network'
      - matchers:
          - name: job
            value: blackbox
        receiver: 'discord-network'

      # -- Renovate --
      - matchers:
          - name: job
            regex: true
            value: .*renovate.*
        receiver: 'discord-info'
    
      # -- Pod Events --
      - matchers:
          - name: category
            value: pod-events
        receiver: 'discord-pods'
        continue: true

      # -- Critical Severity (General Catch-all) --
      - matchers:
          - name: severity
            value: critical
        receiver: 'discord-critical'
        continue: true

      # -- Warnings (General Catch-all) --
      - matchers:
          - name: severity
            value: warning
        receiver: 'discord-warning'
        continue: true
      
      # -- Info --
      - matchers:
          - name: severity
            value: info
        receiver: 'discord-info'

  receivers:
  - name: 'null'
  - name: 'discord-firing'
    discordConfigs:
    - apiURL:
        key: warning-alerts
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}🔔 ALERT{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        {{ if ne .Labels.alertname "Watchdog" }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Started: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*{{ end }}
        {{ end }}

  - name: 'discord-critical'
    discordConfigs:
    - apiURL:
        key: critical-alerts
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}🔥 CRITICAL{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        {{ if ne .Labels.alertname "Watchdog" }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Started: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*{{ end }}
        {{ end }}

  - name: 'discord-warning'
    discordConfigs:
    - apiURL:
        key: warning-alerts
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}⚠️ WARNING{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        {{ if ne .Labels.alertname "Watchdog" }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Started: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*{{ end }}
        {{ end }}

  - name: 'discord-info'
    discordConfigs:
    - apiURL:
        key: info-alerts
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}ℹ️ INFO{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        {{ if ne .Labels.alertname "Watchdog" }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Started: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*{{ end }}
        {{ end }}

  - name: 'discord-network'
    discordConfigs:
    - apiURL:
        key: network-issues
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}🌐 NETWORK{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        {{ if ne .Labels.alertname "Watchdog" }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Started: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*{{ end }}
        {{ end }}

  - name: 'discord-storage'
    discordConfigs:
    - apiURL:
        key: storage-issues
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}💾 STORAGE{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        {{ if ne .Labels.alertname "Watchdog" }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Started: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*{{ end }}
        {{ end }}

  - name: 'discord-heartbeat'
    discordConfigs:
    - apiURL:
        key: alertmanager-healthcheck
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}💓 HEARTBEAT{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Alertmanager up since: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*
        {{ end }}


  - name: 'discord-pods'
    discordConfigs:
    - apiURL:
        key: pod-events
        name: monitoring-discord-webhooks
      sendResolved: true
      title: '{{ if eq .Status "firing" }}📦 POD{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
      message: |-
        {{ range .Alerts }}
        {{ if ne .Labels.alertname "Watchdog" }}
        • **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          *Node: {{ if .Labels.node }}{{ .Labels.node }}{{ end }}{{ if and .Labels.node .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else if .Labels.instance }} ({{ .Labels.instance | reReplaceAll ":\\d+$" "" }}){{ else }}N/A{{ end }}*
          *Started: {{ .StartsAt.Format "2006-01-02T15:04:05Z07:00" }}*{{ end }}
        {{ end }}
