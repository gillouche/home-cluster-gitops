apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: postgres-exporter-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: postgres-health
    rules:
    - alert: PostgresExporterDown
      expr: pg_up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Postgres exporter cannot reach database"
        description: >-
          postgres-exporter cannot connect to the external Postgres instance
          on homeserver3 (192.168.0.89:5432). The K3s control plane datastore
          may be down or unreachable.

    - alert: PostgresConnectionsSaturated
      expr: sum(pg_stat_activity_count) / on() pg_settings_max_connections * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Postgres connections above 80% capacity"
        description: >-
          {{ $value | printf "%.0f" }}% of max_connections in use.
          K3s kine may start failing if connections are exhausted.

    - alert: PostgresConnectionsCritical
      expr: sum(pg_stat_activity_count) / on() pg_settings_max_connections * 100 > 95
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Postgres connections above 95% capacity"
        description: >-
          {{ $value | printf "%.0f" }}% of max_connections in use.
          Immediate risk of K3s control plane failure.

    - alert: PostgresDeadlocks
      expr: rate(pg_stat_database_deadlocks{datname="kubernetes"}[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Deadlocks detected in kubernetes database"
        description: >-
          Deadlocks are occurring in the kubernetes database used by kine.
          This may indicate contention issues.

    - alert: PostgresLongRunningQuery
      expr: pg_stat_activity_max_tx_duration{datname="kubernetes"} > 300
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Long-running query in kubernetes database (>5min)"
        description: >-
          A query has been running for {{ $value | printf "%.0f" }}s in the
          kubernetes database. This may block kine operations.

    - alert: PostgresHighRollbackRate
      expr: >-
        rate(pg_stat_database_xact_rollback{datname="kubernetes"}[5m])
        / (rate(pg_stat_database_xact_commit{datname="kubernetes"}[5m])
        + rate(pg_stat_database_xact_rollback{datname="kubernetes"}[5m])) > 0.1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High transaction rollback rate in kubernetes database"
        description: >-
          {{ $value | printf "%.1f" }}% of transactions are rolling back.

    - alert: PostgresTempFilesHigh
      expr: rate(pg_stat_database_temp_bytes{datname="kubernetes"}[5m]) > 10485760
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Excessive temp file usage in kubernetes database"
        description: >-
          Postgres is writing >10MB/s of temp files, indicating queries
          spilling to disk. work_mem may need tuning.

  - name: kine-health
    rules:
    - alert: KineTableBloat
      expr: pg_kine_stats_table_size_bytes > 1073741824
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Kine table exceeds 1GB"
        description: >-
          Kine table is {{ $value | humanize1024 }}. Compaction may not be
          running. Check the kine-compact systemd timer on homeserver3.

    - alert: KineTableCritical
      expr: pg_kine_stats_table_size_bytes > 5368709120
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Kine table exceeds 5GB"
        description: >-
          Kine table is {{ $value | humanize1024 }}. This will degrade K3s
          API performance. Run compaction immediately.

    - alert: KineEventStorm
      expr: pg_kine_stats_event_rows > 80000
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Kine event count exceeds 80k rows"
        description: >-
          {{ $value | printf "%.0f" }} event rows in kine. This indicates
          event compaction is not keeping up or a storm of k8s events.

    - alert: KineRowCountHigh
      expr: pg_kine_stats_total_rows > 200000
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Kine total row count exceeds 200k"
        description: >-
          {{ $value | printf "%.0f" }} total rows in kine table. Compaction
          should keep this well below this threshold.

    - alert: KineOldEvents
      expr: pg_kine_oldest_event_oldest_event_age_seconds > 86400
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Kine has events older than 24h"
        description: >-
          Oldest kine event is {{ $value | printf "%.0f" }}s old. The
          kine-compact timer may have stopped running.
