---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: overwatchd-secret
  namespace: secrets
spec:
  encryptedData:
    ARGOCD_TOKEN: 
    DISCORD_TOKEN: 
  template:
    metadata:
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: overwatchd
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        sealedsecrets.bitnami.com/managed: "true"
      name: overwatchd-secret
      namespace: secrets
    type: Opaque
