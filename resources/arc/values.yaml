metrics:
  controllerManagerAddr: ":8080"
# Pin Controller to stable nodes
nodeSelector:
  node-class: homeserver
githubConfigSecret: arc-github-creds

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
