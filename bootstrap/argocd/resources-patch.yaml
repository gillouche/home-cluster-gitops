apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-application-controller
          resources:
            requests:
              cpu: 128m
              memory: 3Gi
            limits:
              memory: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
spec:
  template:
    spec:
      containers:
        - name: argocd-server
          resources:
            requests:
              cpu: 15m
              memory: 200Mi
            limits:
              memory: 384Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      containers:
        - name: argocd-repo-server
          resources:
            requests:
              cpu: 15m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-applicationset-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-applicationset-controller
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              memory: 192Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      containers:
        - name: dex
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-notifications-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-notifications-controller
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              memory: 192Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis-ha-haproxy
spec:
  template:
    spec:
      containers:
        - name: haproxy
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-redis-ha-server
spec:
  template:
    spec:
      containers:
        - name: redis
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              memory: 192Mi
        - name: sentinel
          resources:
            requests:
              cpu: 78m
              memory: 64Mi
            limits:
              memory: 128Mi
        - name: split-brain-fix
          resources:
            requests:
              cpu: 15m
              memory: 64Mi
            limits:
              memory: 64Mi
