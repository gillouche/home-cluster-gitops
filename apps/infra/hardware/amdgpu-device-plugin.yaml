apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amdgpu-device-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    notifications.argoproj.io/subscribe.on-sync-failed.webhook.discord-infra: ""
    notifications.argoproj.io/subscribe.on-health-degraded.webhook.discord-infra: ""
  finalizers:
    - argoproj.io/resources-finalizer
spec:
  project: infra-base
  sources:
    - repoURL: https://github.com/ROCm/k8s-device-plugin
      targetRevision: amd-gpu-helm-0.21.0
      path: helm/amd-gpu
      helm:
        valueFiles:
          - $values/resources/amdgpu-device-plugin/values.yaml
    - repoURL: https://github.com/gillouche/home-cluster-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
