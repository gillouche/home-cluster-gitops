apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-custom
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    notifications.argoproj.io/subscribe.on-sync-failed.webhook.discord-infra: ""
    notifications.argoproj.io/subscribe.on-health-degraded.webhook.discord-infra: ""
  finalizers:
    - argoproj.io/resources-finalizer
spec:
  project: infra-base
  source:
    repoURL: https://github.com/gillouche/home-cluster-gitops.git
    targetRevision: HEAD
    path: resources/networking
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: coredns
      jsonPointers:
        - /data/NodeHosts
        - /data/Corefile
    - group: apps
      kind: Deployment
      name: coredns
      jqPathExpressions:
        - .spec.template.spec.containers[].image
        - .spec.template.spec.volumes
        - .spec.template.spec.containers[].volumeMounts
        - .spec.template.spec.dnsPolicy
        - .spec.template.spec.containers[].resources
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:coredns
      jsonPointers:
        - /rules
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
