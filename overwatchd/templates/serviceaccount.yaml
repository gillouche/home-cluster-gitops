# Dedicated ServiceAccount for the bot.
# Every workload should have its own SA rather than using the "default" SA.
# Reasons:
#   1. RBAC: bind ClusterRoles/Roles to this specific SA (Phase 3+ for k8s commands)
#   2. Audit: API server audit logs show which SA made each request
#   3. Blast radius: if compromised, only this SA's permissions are exposed
#
# automountServiceAccountToken: false prevents the kubelet from mounting the
# SA token into pods. The bot doesn't call the Kubernetes API in this phase.
# The Deployment also sets this at the pod level for defense-in-depth.
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "overwatchd.serviceAccountName" . }}
  labels:
    {{- include "overwatchd.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
