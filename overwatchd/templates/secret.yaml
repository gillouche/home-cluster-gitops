# Chart-managed secret for quick local testing.
# In production, set secrets.create=false and provide the secret via:
#   - Bitnami sealed-secrets (SealedSecret → Secret)
#   - external-secrets-operator (ExternalSecret → Secret)
#   - Manual: kubectl create secret generic <name> --from-literal=DISCORD_TOKEN=... --from-literal=ARGOCD_TOKEN=...
#
# The secret must contain exactly these keys (envFrom injects them as env vars):
#   DISCORD_TOKEN — Discord bot token
#   ARGOCD_TOKEN  — ArgoCD API bearer token
#
# stringData accepts plain text and Kubernetes base64-encodes it automatically.
# This avoids the error-prone manual base64 encoding required by the "data" field.
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "overwatchd.secretName" . }}
  labels:
    {{- include "overwatchd.labels" . | nindent 4 }}
type: Opaque
stringData:
  DISCORD_TOKEN: {{ .Values.secrets.discordToken | quote }}
  ARGOCD_TOKEN: {{ .Values.secrets.argocdToken | quote }}
{{- end }}
