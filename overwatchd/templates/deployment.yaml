apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "overwatchd.fullname" . }}
  labels:
    {{- include "overwatchd.labels" . | nindent 4 }}
spec:
  # Discord bot tokens support only ONE active WebSocket connection.
  # Multiple replicas cause reconnect loops. Always 1.
  replicas: {{ .Values.replicaCount }}
  # Limit old ReplicaSets kept for rollback. Kubernetes default is 10,
  # which wastes etcd storage for a single-replica app.
  revisionHistoryLimit: 3
  # Recreate (not RollingUpdate) because two concurrent bot instances
  # would fight over the Discord WebSocket connection. Recreate ensures
  # the old pod is fully terminated before the new one starts.
  strategy:
    type: Recreate
  selector:
    # These labels are immutable after creation. They must match
    # template.metadata.labels exactly. Use only selectorLabels here
    # (not full labels) so upgrades don't break the selector.
    matchLabels:
      {{- include "overwatchd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Checksum annotations trigger a pod restart when ConfigMap/Secret
        # contents change. Without these, Kubernetes won't restart the pod
        # because the Deployment spec itself hasn't changed (it only
        # references the ConfigMap/Secret by name, not by content).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets.create }}
        # Only include secret checksum when the chart manages the secret.
        # For external secrets (sealed-secrets), the controller handles
        # secret updates and you may use a Reloader or stakater/reloader
        # to restart pods on secret changes.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "overwatchd.selectorLabels" . | nindent 8 }}
    spec:
      # Disable mounting the ServiceAccount token into the pod.
      # The bot doesn't call the Kubernetes API in this phase. When Phase 3
      # adds k8s commands, remove this or set it to true and bind RBAC roles.
      # Leaving it mounted when unused is a security risk — a compromised
      # pod could use the token to access the cluster API.
      automountServiceAccountToken: false
      serviceAccountName: {{ include "overwatchd.serviceAccountName" . }}
      # Pod-level security context applies to all containers and init containers.
      securityContext:
        # Refuse to start if the container tries to run as root (UID 0).
        # Defense-in-depth: even if the image is misconfigured, the kubelet
        # blocks it. The distroless base image has no root user anyway.
        runAsNonRoot: true
        # Run as "nobody" (UID/GID 65534). This is a well-known unprivileged
        # user present in most Linux distributions and distroless images.
        runAsUser: 65534
        runAsGroup: 65534
        # fsGroup sets the group ownership of volume-mounted files.
        # Not strictly needed here (no volumes), but included for correctness
        # if volumes are added later.
        fsGroup: 65534
        # Seccomp (secure computing mode) restricts which Linux syscalls the
        # container can make. RuntimeDefault uses the container runtime's
        # built-in seccomp profile (blocks ~40 dangerous syscalls like
        # reboot, mount, ptrace). This is required by Pod Security Standards
        # at the "restricted" level.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "overwatchd.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # envFrom injects all keys from a ConfigMap/Secret as environment
          # variables. Simpler than listing individual env: entries, and the
          # variable names match the Go config loader (os.Getenv).
          envFrom:
            - configMapRef:
                name: {{ include "overwatchd.fullname" . }}
            # The secret is always referenced. If it doesn't exist yet
            # (sealed-secret not synced), the pod stays in
            # CreateContainerConfigError until the secret appears — this is
            # the correct behavior (fail-closed, don't start without credentials).
            - secretRef:
                name: {{ include "overwatchd.secretName" . }}
          ports:
            - name: health
              containerPort: {{ int .Values.config.healthPort }}
              protocol: TCP
          # Liveness probe: "is the process alive?"
          # If this fails, the kubelet kills and restarts the container.
          # /healthz always returns 200 if the HTTP server is running.
          # initialDelaySeconds gives the process time to start its HTTP server.
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          # Readiness probe: "is the pod ready to handle traffic?"
          # If this fails, the pod is removed from Service endpoints.
          # /readyz returns 200 only after the Discord session is connected
          # and slash commands are registered. This prevents routing health
          # checks to a pod that hasn't fully started yet.
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Container-level security context (overrides or supplements pod-level).
          securityContext:
            # Explicitly not privileged. Privileged containers bypass ALL
            # Linux security mechanisms (namespaces, cgroups, seccomp, AppArmor).
            # Never needed for an application container.
            privileged: false
            # Belt-and-suspenders with the pod-level setting.
            runAsNonRoot: true
            # Prevent writing to the container's root filesystem.
            # The binary runs from / in the distroless image — this makes the
            # entire filesystem immutable at runtime. Any write attempt fails
            # with EROFS. If the app needs to write temp files, mount an
            # emptyDir volume instead.
            readOnlyRootFilesystem: true
            # Prevent the container from gaining more privileges than its
            # parent process (blocks setuid binaries, Linux capabilities
            # escalation via execve). Required by Pod Security Standards
            # "restricted" level.
            allowPrivilegeEscalation: false
            # Drop ALL Linux capabilities. By default, Docker grants a subset
            # (~14 capabilities). Dropping all means the process runs with
            # zero extra kernel privileges. For a Go HTTP + WebSocket client,
            # no capabilities are needed.
            capabilities:
              drop:
                - ALL
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
